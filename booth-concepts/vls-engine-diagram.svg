<line x1="958" y1="322" x2="1248" y2="142" stroke="#4ADE5C" stroke-width="1.6" opacity="0.32" marker-end="url(#arG)"/>
<line x1="962" y1="335" x2="1246" y2="335" stroke="#4ADE5C" stroke-width="1.6" opacity="0.32" marker-end="url(#arG)"/>
