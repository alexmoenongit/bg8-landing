  <text x="0" y="72" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="2.5" fill="#4ADE5C" opacity="0.9">VENDOR AI</text>
</g>

<!-- INCOMING LINES: Customers → Customer AI -->
<line x1="152" y1="142" x2="422" y2="322" stroke="#00C2E0" stroke-width="1.6" opacity="0.32" marker-end="url(#arT)"/>
<line x1="154" y1="335" x2="418" y2="335" stroke="#00C2E0" stroke-width="1.6" opacity="0.32" marker-end="url(#arT)"/>
<line x1="152" y1="528" x2="422" y2="348" stroke="#00C2E0" stroke-width="1.6" opacity="0.32" marker-end="url(#arT)"/>
<text x="272" y="320" text-anchor="middle" font-size="10" font-weight="600" letter-spacing="2.5" fill="#00C2E0" opacity="0.45">REQUEST</text>

