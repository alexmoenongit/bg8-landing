<text x="700" y="316" text-anchor="middle" font-size="10" letter-spacing="3.5" fill="#7BB5A8" opacity="0.5">ORCHESTRATE</text>

<!-- CUSTOMER AI NODE -->
<g transform="translate(490,335)">
  <circle cx="0" cy="0" r="105" fill="url(#tealAura)" opacity="0.7"/>
  <circle cx="0" cy="0" r="54" fill="none" stroke="#00C2E0" stroke-width="1.3" opacity="0.22" stroke-dasharray="6,7"/>
  <circle cx="0" cy="0" r="38" fill="url(#tealCore)" opacity="0.95"/>
  <circle cx="0" cy="0" r="12" fill="#ffffff" opacity="0.97"/>
  <text x="0" y="72" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="2.5" fill="#00C2E0" opacity="0.9">CUSTOMER AI</text>
</g>

<!-- VENDOR AI NODE -->
<g transform="translate(910,335)">
  <circle cx="0" cy="0" r="105" fill="url(#greenAura)" opacity="0.7"/>
  <circle cx="0" cy="0" r="54" fill="none" stroke="#4ADE5C" stroke-width="1.3" opacity="0.22" stroke-dasharray="6,7"/>
  <circle cx="0" cy="0" r="38" fill="url(#greenCore)" opacity="0.95"/>
