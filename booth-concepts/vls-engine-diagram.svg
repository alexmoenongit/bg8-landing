<svg width="1400" height="680" viewBox="0 0 1400 680" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#00C2E0"/><stop offset="100%" stop-color="#4ADE5C"/></linearGradient>
  <linearGradient id="arrowGrad" gradientUnits="userSpaceOnUse" x1="534" y1="335" x2="866" y2="335">
    <stop offset="0%" stop-color="#00C2E0"/><stop offset="100%" stop-color="#4ADE5C"/>
  </linearGradient>
  <linearGradient id="arrowGlow" gradientUnits="userSpaceOnUse" x1="534" y1="335" x2="866" y2="335">
    <stop offset="0%" stop-color="#00C2E0" stop-opacity="0.4"/><stop offset="100%" stop-color="#4ADE5C" stop-opacity="0.4"/>
  </linearGradient>
  <linearGradient id="engineFill" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00C2E0" stop-opacity="0.1"/><stop offset="100%" stop-color="#4ADE5C" stop-opacity="0.04"/></linearGradient>
  <radialGradient id="tealCore" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#00C2E0"/></radialGradient>
  <radialGradient id="greenCore" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#4ADE5C"/></radialGradient>
  <radialGradient id="tealAura" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#00C2E0" stop-opacity="0.3"/><stop offset="100%" stop-color="#00C2E0" stop-opacity="0"/></radialGradient>
  <radialGradient id="greenAura" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#4ADE5C" stop-opacity="0.28"/><stop offset="100%" stop-color="#4ADE5C" stop-opacity="0"/></radialGradient>
  <radialGradient id="engineGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#00C2E0" stop-opacity="0.09"/><stop offset="100%" stop-color="#00C2E0" stop-opacity="0"/></radialGradient>
  <filter id="softglow"><feGaussianBlur stdDeviation="6"/></filter>
  <marker id="arT" markerWidth="7" markerHeight="7" refX="4" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#00C2E0" opacity="0.55"/></marker>
  <marker id="arG" markerWidth="7" markerHeight="7" refX="4" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#4ADE5C" opacity="0.55"/></marker>
</defs>

<rect width="1400" height="680" fill="#141C22"/>
<ellipse cx="700" cy="340" rx="420" ry="260" fill="url(#engineGlow)"/>

<!-- ENGINE CONTAINER -->
<rect x="295" y="72" width="810" height="520" rx="64" fill="url(#engineFill)"/>
<rect x="295" y="72" width="810" height="520" rx="64" fill="none" stroke="url(#bg)" stroke-width="2" opacity="0.75"/>
<rect x="299" y="76" width="802" height="512" rx="62" fill="none" stroke="#00C2E0" stroke-width="0.6" opacity="0.12"/>
<text x="700" y="56" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="5" fill="url(#bg)" opacity="0.9">VLS ENGINE</text>
<text x="700" y="567" text-anchor="middle" font-size="11" letter-spacing="3.5" fill="#7BB5A8" opacity="0.5">CONNECT  ·  ORCHESTRATE  ·  EXECUTE</text>

<!-- ORCHESTRATE ARROW -->
<line x1="534" y1="335" x2="866" y2="335" stroke="url(#arrowGlow)" stroke-width="14" filter="url(#softglow)"/>
<line x1="548" y1="335" x2="852" y2="335" stroke="url(#arrowGrad)" stroke-width="4.5" opacity="0.9"/>
<polygon points="868,335 850,324 850,346" fill="#4ADE5C" opacity="0.9"/>
